<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Flap — a responsive Flappy Bird game with skins, coins, accounts, and real-time multiplayer. Play in your browser, no install required." />
  <meta name="theme-color" content="#0d0d1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flap" />
  <title>Flap</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- Auth overlay: login / register / profile -->
  <div id="authOverlay" class="overlay hidden">
    <div class="modal-card" id="authCard"></div>
  </div>

  <!-- Code-entry overlay: join a multiplayer room -->
  <div id="codeOverlay" class="overlay hidden">
    <div class="modal-card">
      <h2>Join Room</h2>
      <p class="modal-sub">Enter the code your friend shared</p>
      <input id="codeInput" type="text" maxlength="7"
             placeholder="ABC-123" autocomplete="off" spellcheck="false" />
      <div id="codeError" class="error-msg hidden"></div>
      <div class="modal-buttons">
        <button id="codeJoinBtn"   class="btn-primary">Connect</button>
        <button id="codeCancelBtn" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js" defer></script>
  <script src="game.js" defer></script>
</body>
</html>
